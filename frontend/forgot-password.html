<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password — PredMarket</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 80px auto; padding: 0 20px; }
    input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
    button { width: 100%; padding: 12px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
    button:hover { background: #1558b0; }
    .error { color: red; font-size: 14px; margin-top: 8px; }
    .success { color: green; font-size: 14px; margin-top: 8px; }
    .link { text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>Reset your password</h2>
  <p>Enter your email and we'll send you a reset link.</p>

  <input type="email" id="email" placeholder="Email" />
  <button onclick="handleReset()">Send Reset Link</button>
  <div class="error" id="error"></div>
  <div class="success" id="success"></div>
  <div class="link"><a href="login.html">Back to login</a></div>

  <script type="module">
    import { auth } from "./firebase-config.js";
    import { sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    window.handleReset = async function () {
      const email = document.getElementById("email").value.trim();
      const errorDiv = document.getElementById("error");
      const successDiv = document.getElementById("success");

      errorDiv.textContent = "";
      successDiv.textContent = "";

      if (!email) {
        errorDiv.textContent = "Please enter your email address.";
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        successDiv.textContent = "Reset link sent! Check your inbox.";
        document.getElementById("email").value = "";
      } catch (err) {
        const messages = {
          "auth/invalid-email": "Please enter a valid email address.",
          "auth/user-not-found": "No account found with this email.",
          "auth/too-many-requests": "Too many attempts. Try again later.",
        };
        errorDiv.textContent = messages[err.code] || "Something went wrong. Please try again.";
      }
    };
  </script>
</body>
</html>
